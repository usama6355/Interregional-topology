<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#06101e;}
#wrap{width:100%;height:100%;}
#mainsvg{width:100%;height:100%;display:block;}
#tvbtn{position:fixed;bottom:16px;right:20px;z-index:999;
  background:rgba(0,180,255,.1);border:1.5px solid rgba(0,180,255,.45);
  color:#40c0ff;font-size:10px;letter-spacing:2px;padding:8px 18px;
  cursor:pointer;border-radius:18px;font-family:'Segoe UI',sans-serif;font-weight:700;text-transform:uppercase;}
#tvov{display:none;position:fixed;inset:0;background:#06101e;z-index:9999;}
#tvov.on{display:block;}
#tvsvg{width:100%;height:100%;display:block;}
#exitbtn{position:fixed;bottom:16px;right:20px;z-index:10000;
  background:rgba(0,180,255,.1);border:1.5px solid rgba(0,180,255,.45);
  color:#40c0ff;font-size:10px;letter-spacing:2px;padding:8px 18px;
  cursor:pointer;border-radius:18px;font-family:'Segoe UI',sans-serif;font-weight:700;text-transform:uppercase;display:none;}
/* Only IR/inter links animate */
@keyframes irflow{to{stroke-dashoffset:-40}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinr{to{transform:rotate(-360deg)}}
</style>

<button id="tvbtn" onclick="enterTV()">⛶ TV MODE</button>
<div id="tvov"><svg id="tvsvg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid meet"
  xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;display:block;"></svg></div>
<button id="exitbtn" onclick="exitTV()">✕ EXIT TV</button>
<script>
function enterTV(){
  document.getElementById('tvsvg').innerHTML=document.getElementById('mainsvg').innerHTML;
  document.getElementById('tvov').classList.add('on');
  document.getElementById('exitbtn').style.display='block';
  document.getElementById('tvbtn').style.display='none';
}
function exitTV(){
  document.getElementById('tvov').classList.remove('on');
  document.getElementById('exitbtn').style.display='none';
  document.getElementById('tvbtn').style.display='block';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')exitTV();});
</script>
